<!-- nginx/html/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate RAG — 知识库管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['IBM Plex Sans', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- ====== Sidebar ====== -->
    <aside id="sidebar" class="fixed top-0 left-0 z-30 h-screen w-64 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0">
        <!-- Logo -->
        <div class="px-5 py-5 border-b border-slate-700">
            <h1 class="text-lg font-semibold text-white flex items-center gap-2">
                <span class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white text-sm font-bold">FQ</span>
                Corporate RAG
            </h1>
            <p class="text-xs text-slate-500 mt-1">金融文档智能问答系统</p>
        </div>

        <!-- Navigation -->
        <nav class="px-3 py-4 border-b border-slate-700">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-800">
                <span>💬</span> 智能问答
            </a>
            <a href="/Knowledgebase" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600/10 text-blue-400 mt-1">
                <span>📚</span> 知识库管理
            </a>
        </nav>

        <!-- KB List -->
        <div class="flex-1 overflow-hidden flex flex-col">
            <div class="px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">知识库</div>
            <div id="sidebar-kb-list" class="sidebar-kb-list flex-1 overflow-y-auto px-3 pb-2">
                <!-- Populated by JS -->
                <div class="px-3 py-8 text-center text-xs text-slate-600">暂无知识库</div>
            </div>
        </div>

        <!-- New KB Button -->
        <div class="px-3 py-3 border-t border-slate-700">
            <button onclick="showCreateModal()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新建知识库
            </button>
        </div>
    </aside>

    <!-- ====== Mobile Overlay ====== -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="sidebar-overlay fixed inset-0 z-20 bg-black/50 hidden md:hidden"></div>

    <!-- ====== Hamburger (mobile) ====== -->
    <button onclick="toggleSidebar()" class="fixed top-3 left-3 z-10 md:hidden w-9 h-9 rounded-lg bg-white border border-slate-200 shadow-sm flex items-center justify-center text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <!-- ====== User Area (top-right) ====== -->
    <div id="user-area" class="fixed top-14 md:top-8 right-3 z-10 flex items-center gap-3">
        <!-- Populated by updateUserArea() -->
    </div>

    <!-- ====== Clickaway handler for user dropdown ====== -->
    <div id="user-dropdown-backdrop" class="fixed inset-0 z-0 hidden"></div>

    <!-- ====== Main Content ====== -->
    <main class="md:ml-64 min-h-screen p-4 md:p-6 lg:p-8 pt-14 md:pt-8 md:pr-48 lg:pr-48">
        <!-- Page Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
            <h2 class="text-xl md:text-2xl font-bold text-slate-900">知识库管理</h2>
            <button onclick="showCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新建知识库
            </button>
        </div>

        <!-- KB List (grid cards view) -->
        <div id="kb-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
            <!-- Populated by JS -->
            <div class="col-span-full">
                <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                    <div class="text-5xl mb-4">📂</div>
                    <p class="text-sm mb-1">暂无知识库</p>
                    <p class="text-xs text-slate-400">点击右上角「新建知识库」开始</p>
                </div>
            </div>
        </div>

        <!-- Document section (shown when KB selected) -->
        <div id="doc-section" class="hidden">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
                <!-- Header -->
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 px-5 py-4 border-b border-slate-100">
                    <div>
                        <h3 id="doc-section-title" class="font-semibold text-slate-900">文档列表</h3>
                        <p id="doc-section-subtitle" class="text-xs text-slate-500 mt-0.5"></p>
                    </div>
                    <label class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors cursor-pointer shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        上传文档
                        <input type="file" id="file-input" accept=".pdf,.docx,.txt" class="hidden" onchange="handleUpload(event)">
                    </label>
                </div>
                <!-- Document list -->
                <div id="doc-list" class="divide-y divide-slate-100">
                    <!-- Populated by JS -->
                    <div class="flex flex-col items-center justify-center py-12 text-slate-400">
                        <div class="text-4xl mb-3">📄</div>
                        <p class="text-sm">选择知识库后查看文档</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ====== Create KB Modal ====== -->
    <div id="create-modal" class="fixed inset-0 z-40 hidden">
        <div onclick="hideCreateModal()" class="modal-backdrop absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative z-10 animate-[fadeIn_0.2s_ease-out]">
                <h3 class="text-lg font-semibold text-slate-900 mb-1">新建知识库</h3>
                <p class="text-sm text-slate-500 mb-5">创建一个新的知识库来管理文档</p>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">知识库名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="kb-name" class="w-full px-3.5 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-shadow" placeholder="例如：2024年年报">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">描述（可选）</label>
                        <textarea id="kb-desc" rows="2" class="w-full px-3.5 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-shadow resize-none" placeholder="简要描述知识库内容"></textarea>
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button onclick="hideCreateModal()" class="px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">取消</button>
                    <button onclick="handleCreate()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== Delete Confirm Modal ====== -->
    <div id="delete-modal" class="fixed inset-0 z-40 hidden">
        <div onclick="hideDeleteModal()" class="modal-backdrop absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative z-10 animate-[fadeIn_0.2s_ease-out]">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
                        <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-900">确认删除</h3>
                        <p id="delete-modal-text" class="text-sm text-slate-500 mt-0.5">此操作不可撤销，知识库内的所有文档将被清除。</p>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-5">
                    <button onclick="hideDeleteModal()" class="px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">取消</button>
                    <button id="delete-confirm-btn" class="px-5 py-2.5 bg-red-600 hover:bg-red-500 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">删除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== Chunk Preview Modal ====== -->
    <div id="chunk-modal" class="fixed inset-0 z-40 hidden">
        <div onclick="hideChunkPreview()" class="modal-backdrop absolute inset-0 bg-black/30"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="chunk-modal-panel bg-white rounded-xl shadow-xl w-[80vw] max-w-[80vw] max-h-[85vh] flex flex-col relative z-10">
                <!-- Header -->
                <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                    <div class="min-w-0 mr-4">
                        <h3 id="chunk-modal-title" class="text-base font-semibold text-slate-900 truncate">分块预览</h3>
                        <p id="chunk-modal-subtitle" class="text-xs text-slate-400 mt-0.5 font-medium"></p>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span id="chunk-count-badge" class="hidden text-xs font-semibold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full"></span>
                        <button onclick="hideChunkPreview()" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>
                <!-- Content -->
                <div id="chunk-list" class="flex-1 overflow-y-auto px-6 py-4 space-y-3 min-h-0">
                    <div class="chunk-loading">
                        <div class="spinner"></div>
                        <span>加载分块数据...</span>
                    </div>
                </div>
                <!-- Pagination Footer -->
                <div id="chunk-pagination" class="hidden flex items-center justify-between px-6 py-3 border-t border-slate-100 bg-slate-50/80">
                    <span id="chunk-page-info" class="text-xs text-slate-500 font-medium"></span>
                    <div class="flex items-center gap-2">
                        <button id="chunk-prev-btn" onclick="changeChunkPage(-1)" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">上一页</button>
                        <button id="chunk-next-btn" onclick="changeChunkPage(1)" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== Upload Loading Modal ====== -->
    <div id="upload-loading" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="bg-white rounded-2xl px-10 py-8 shadow-2xl flex flex-col items-center">
                <div class="spinner mb-4" style="width:32px;height:32px;border-width:3px"></div>
                <p class="text-sm font-medium text-slate-700">正在同步上传中...</p>
                <p class="text-xs text-slate-400 mt-1">请勿关闭页面</p>
            </div>
        </div>
    </div>

    <!-- ====== Toast ====== -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-xl text-white text-sm shadow-xl max-w-2xl hidden" style="background-color: #059669; word-break: break-word; text-align: center; white-space: pre-wrap;">
        <span class="toast-icon w-5 h-5 rounded-full bg-white/20 flex items-center justify-center text-xs flex-shrink-0">✓</span>
        <span class="toast-text flex-1 min-w-0"></span>
    </div>

    <!-- ====== Scripts ====== -->
    <script src="js/api.js?v=11"></script>
    <script>
        let _userId = '';

        (async function checkAuth() {
            try {
                const traceId = generateTraceId();
                const r = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Trace-ID': traceId },
                    body: JSON.stringify({}),
                });
                const d = await r.json();
                if (d.code !== 'SUCCESS' || !d.data?.valid) {
                    updateUserArea(null);
                } else {
                    updateUserArea(d.data.user_id || '');
                }
            } catch (e) {
                updateUserArea(null);
            }
        })();

        function updateUserArea(userId) {
            const el = document.getElementById('user-area');
            if (!userId) {
                el.innerHTML = '<a href="/login.html?redirect=' + encodeURIComponent(location.pathname) + '" class="inline-flex items-center gap-1.5 px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-sm font-medium rounded-lg shadow-sm transition-all hover:shadow-md">登录</a>';
                return;
            }
            el.innerHTML = [
                '<div class="relative">',
                '<button onclick="toggleUserDropdown(event)" class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm hover:shadow-md transition-shadow cursor-pointer">',
                '<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>',
                '</button>',
                '<div id="user-dropdown" class="absolute right-0 top-full mt-2 w-40 bg-white rounded-xl border border-slate-200 shadow-lg py-1.5 hidden">',
                '<button onclick="handleLogout()" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2 cursor-pointer">',
                '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>',
                '退出登录',
                '</button>',
                '</div>',
                '</div>',
            ].join('');
        }

        function toggleUserDropdown(e) {
            if (e) e.stopPropagation();
            const dd = document.getElementById('user-dropdown');
            const bk = document.getElementById('user-dropdown-backdrop');
            const open = dd.classList.contains('hidden');
            dd.classList.toggle('hidden', !open);
            bk.classList.toggle('hidden', !open);
            if (open) {
                setTimeout(() => document.addEventListener('click', closeOnClickOutside), 0);
            }
        }

        function closeOnClickOutside(e) {
            const dd = document.getElementById('user-dropdown');
            const ua = document.getElementById('user-area');
            if (!ua.contains(e.target)) {
                closeUserDropdown();
                document.removeEventListener('click', closeOnClickOutside);
            }
        }

        function closeUserDropdown() {
            document.getElementById('user-dropdown').classList.add('hidden');
            document.getElementById('user-dropdown-backdrop').classList.add('hidden');
            document.removeEventListener('click', closeOnClickOutside);
        }

        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (_) {}
            document.cookie = 'token=; path=/; max-age=0';
            location.href = '/login.html';
        }

        let selectedKbId = null;
        let selectedKbName = '';

        // ====== Sidebar ======
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // ====== Load KBs ======
        async function loadKBs() {
            try {
                const kbs = await listKBs();

                // Sidebar KB list
                const sidebarList = document.getElementById('sidebar-kb-list');
                if (kbs.length === 0) {
                    sidebarList.innerHTML = '<div class="px-3 py-6 text-center text-xs text-slate-600">暂无知识库</div>';
                } else {
                    sidebarList.innerHTML = kbs.map(kb =>
                        `<button onclick="selectKB('${kb.id}','${escapeAttr(kb.name)}')" class="w-full text-left px-3 py-2 rounded-lg text-sm mb-0.5 transition-colors ${selectedKbId === kb.id ? 'bg-blue-600/15 text-blue-400 font-medium' : 'text-slate-400 hover:text-white hover:bg-slate-800'}">
                            <div class="truncate">${kb.name}</div>
                            <div class="text-[10px] ${selectedKbId === kb.id ? 'text-blue-400/60' : 'text-slate-600'}">${kb.doc_count || 0} 文档</div>
                        </button>`
                    ).join('');
                }

                // Main grid
                const grid = document.getElementById('kb-grid');
                if (kbs.length === 0) {
                    grid.innerHTML = `<div class="col-span-full">
                        <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                            <div class="text-5xl mb-4">📂</div>
                            <p class="text-sm mb-1">暂无知识库</p>
                            <p class="text-xs text-slate-400">点击右上角「新建知识库」开始</p>
                        </div>
                    </div>`;
                } else {
                    grid.innerHTML = kbs.map(kb =>
                        `<div onclick="selectKB('${kb.id}','${escapeAttr(kb.name)}')" class="bg-white rounded-xl border border-slate-200 p-5 hover:border-blue-300 hover:shadow-md transition-all cursor-pointer group">
                            <div class="flex items-start justify-between mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 font-bold">${kb.name.charAt(0)}</div>
                                    <div>
                                        <h4 class="font-medium text-slate-900 text-sm">${kb.name}</h4>
                                        <p class="text-xs text-slate-400 mt-0.5">${kb.doc_count || 0} 个文档</p>
                                    </div>
                                </div>
                                <button onclick="event.stopPropagation(); showDeleteModal('${kb.id}','${escapeAttr(kb.name)}')" class="opacity-0 group-hover:opacity-100 p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                            <p class="text-xs text-slate-400 line-clamp-2">${kb.description || '暂无描述'}</p>
                            <div class="mt-3 flex items-center gap-2 text-xs text-slate-400">
                                <span>ID: ${kb.id.slice(0,8)}...</span>
                                ${kb.created_at ? `<span>· ${new Date(kb.created_at).toLocaleDateString()}</span>` : ''}
                            </div>
                        </div>`
                    ).join('');
                }
            } catch (err) {
                if (err.message === 'AUTH_REQUIRED') {
                    location.href = '/login.html?redirect=' + encodeURIComponent(location.pathname);
                    return;
                }
                showToast('加载知识库失败: ' + err.message, 'error');
            }
        }

        function escapeAttr(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // ====== Create KB ======
        function showCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('kb-name').focus(), 100);
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
            document.getElementById('kb-name').value = '';
            document.getElementById('kb-desc').value = '';
        }

        async function handleCreate() {
            const name = document.getElementById('kb-name').value.trim();
            if (!name) { showToast('请输入知识库名称', 'error'); return; }
            try {
                await createKB(name, document.getElementById('kb-desc').value.trim());
                showToast('知识库创建成功');
                hideCreateModal();
                loadKBs();
            } catch (err) {
                showToast('创建失败: ' + err.message, 'error');
            }
        }

        // ====== Delete KB ======
        let deleteKbId = null;

        function showDeleteModal(kbId, kbName) {
            deleteKbId = kbId;
            document.getElementById('delete-modal-text').textContent = `确定要删除「${kbName}」吗？此操作不可撤销。`;
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('delete-confirm-btn').onclick = handleDelete;
        }

        function hideDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
            deleteKbId = null;
            deleteDocInfo = null;
        }

        async function handleDelete() {
            if (!deleteKbId) return;
            try {
                await deleteKB(deleteKbId);
                showToast('知识库已删除');
                if (selectedKbId === deleteKbId) {
                    selectedKbId = null;
                    document.getElementById('doc-section').classList.add('hidden');
                }
                hideDeleteModal();
                loadKBs();
            } catch (err) {
                showToast('删除失败: ' + err.message, 'error');
            }
        }

        // ====== Delete Document ======
        let deleteDocInfo = null;

        function showDeleteDocModal(kbId, docId, filename) {
            deleteDocInfo = { kbId, docId };
            document.getElementById('delete-modal-text').textContent = `确定要删除「${filename}」吗？此操作不可撤销。`;
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('delete-confirm-btn').onclick = handleDeleteDoc;
        }

        async function handleDeleteDoc() {
            if (!deleteDocInfo) return;
            try {
                hideDeleteModal();
                const r = await apiRequest('/kbs/documents/delete', {
                    method: 'POST',
                    body: JSON.stringify({ kb_id: deleteDocInfo.kbId, doc_id: deleteDocInfo.docId }),
                });
                if (!r.success) throw new Error('删除失败');
                showToast('文档已删除');
                deleteDocInfo = null;
                setTimeout(() => {
                    loadDocuments(selectedKbId);
                    loadKBs();
                }, 1000);
            } catch (err) {
                showToast('删除失败: ' + err.message, 'error');
            }
        }

        // ====== Select KB ======
        async function selectKB(kbId, name) {
            selectedKbId = kbId;
            selectedKbName = name;
            document.getElementById('doc-section').classList.remove('hidden');
            document.getElementById('doc-section-title').textContent = `📄 ${name}`;
            document.getElementById('doc-section-subtitle').textContent = `知识库 ID: ${kbId}`;

            // Reload sidebar to highlight active
            loadKBs();

            // Show loading state
            document.getElementById('doc-list').innerHTML = `
                <div class="px-5 py-6 space-y-3">
                    <div class="skeleton h-12 w-full"></div>
                    <div class="skeleton h-12 w-full"></div>
                    <div class="skeleton h-12 w-3/4"></div>
                </div>`;

            // Close sidebar on mobile
            if (window.innerWidth < 768) toggleSidebar();

            await loadDocuments(kbId);
        }

        // ====== Load Documents ======
        async function loadDocuments(kbId) {
            try {
                const docs = await listDocuments(kbId);
                const list = document.getElementById('doc-list');

                if (docs.length === 0) {
                    list.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-slate-400">
                        <div class="text-4xl mb-3">📄</div>
                        <p class="text-sm mb-1">暂无文档</p>
                        <p class="text-xs text-slate-400">点击右上角「上传文档」添加</p>
                    </div>`;
                    return;
                }

                list.innerHTML = docs.map((doc, i) => `
                    <div class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50 transition-colors group ${doc.status === 'ready' ? 'cursor-pointer' : ''}" ${doc.status === 'ready' ? `onclick="showChunkPreview('${kbId}','${doc.id}','${escapeAttr(doc.filename)}')"` : ''}>
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <div class="w-8 h-8 rounded-lg ${(doc.file_type || doc.type) === 'pdf' ? 'bg-red-100' : (doc.file_type || doc.type) === 'docx' ? 'bg-blue-100' : 'bg-slate-100'} flex items-center justify-center flex-shrink-0 text-xs font-bold ${(doc.file_type || doc.type) === 'pdf' ? 'text-red-600' : (doc.file_type || doc.type) === 'docx' ? 'text-blue-600' : 'text-slate-600'}">${((doc.file_type || doc.type) || 'txt').toUpperCase().slice(0,3)}</div>
                            <div class="min-w-0">
                                <div class="text-sm font-medium text-slate-900 truncate">${doc.filename}</div>
                                <div class="flex items-center gap-2 text-xs text-slate-400 mt-0.5">
                                    <span>${formatSize(doc.size)}</span>
                                    ${doc.chunk_count ? `<span>· ${doc.chunk_count} 分块</span>` : ''}
                                    ${doc.created_at ? `<span>· ${new Date(doc.created_at).toLocaleDateString()}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="status-badge ${doc.status === 'ready' ? 'ready' : doc.status === 'error' ? 'error' : 'processing'}">
                                ${doc.status === 'ready' ? '✓ 就绪' : doc.status === 'error' ? '✕ 失败' : '⋯ 处理中'}
                            </span>
                            ${doc.status === 'ready' || doc.status === 'error' ? `<button onclick="event.stopPropagation();showDeleteDocModal('${kbId}','${doc.id}','${escapeAttr(doc.filename)}')" class="p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors" title="删除文档">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                const list = document.getElementById('doc-list');
                list.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-red-400">
                    <div class="text-4xl mb-3">⚠</div>
                    <p class="text-sm">加载文档失败</p>
                    <button onclick="loadDocuments('${kbId}')" class="mt-3 text-xs text-blue-600 hover:underline">重试</button>
                </div>`;
                showToast('加载文档失败: ' + err.message, 'error');
            }
        }

        // ====== Upload Document ======
        async function handleUpload(event) {
            const file = event.target.files[0];
            if (!file || !selectedKbId) {
                if (!selectedKbId) showToast('请先选择一个知识库', 'warning');
                return;
            }

            // Show persistent loading (duration=0 means no auto-dismiss)
            showToast(`正在上传 ${file.name}...`, 'info', 0);
            const toastText = document.querySelector('#toast span');

            document.getElementById('upload-loading').classList.remove('hidden');

            try {
                const result = await uploadDocument(selectedKbId, file);
                document.getElementById('upload-loading').classList.add('hidden');
                const docId = result.doc_id;

                if (result.status === 'parsing' && docId) {
                    toastText.textContent = `${file.name} 上传成功，正在处理...`;

                    // Poll status every second until done or failed
                    let pollCount = 0;
                    const poll = setInterval(async () => {
                        pollCount++;
                        try {
                            const traceId = generateTraceId();
                            const statusResp = await fetch(`${API_BASE}/kbs/documents/status`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'X-Trace-ID': traceId },
                                body: JSON.stringify({ kb_id: selectedKbId, doc_id: docId }),
                            });
                            const body = await statusResp.json();
                            const data = body.data || {};
                            toastText.textContent = `正在处理 ${file.name}... ${data.progress}%`;

                            if (data.status === 'ready') {
                                clearInterval(poll);
                                hideToast();
                                showToast(`${file.name} 处理完成，共 ${data.chunk_count} 个分块`, 'success');
                                await loadDocuments(selectedKbId);
                                await loadKBs();
                            } else if (data.status === 'failed') {
                                clearInterval(poll);
                                hideToast();
                                showToast(`处理失败: ${data.error || '未知错误'}`, 'error');
                            } else if (pollCount > 120) {
                                clearInterval(poll);
                                hideToast();
                                showToast('处理超时，请查看文档列表确认状态', 'warning');
                                await loadDocuments(selectedKbId);
                            }
                        } catch (e) {
                            clearInterval(poll);
                            hideToast();
                            showToast('查询处理状态失败', 'error');
                        }
                    }, 1000);
                } else if (result.chunk_count !== undefined) {
                    hideToast();
                    showToast(`上传成功：${result.chunk_count} 个文本分块已入库`, 'success');
                    await loadDocuments(selectedKbId);
                    await loadKBs();
                } else {
                    hideToast();
                    showToast('上传成功', 'success');
                    await loadDocuments(selectedKbId);
                    await loadKBs();
                }
            } catch (err) {
                document.getElementById('upload-loading').classList.add('hidden');
                hideToast();
                showToast('上传失败: ' + err.message, 'error');
            }
            event.target.value = '';
        }

        // ====== Chunk Preview (server-side pagination) ======
        let _chunkCurrentPage = 1;
        let _chunkTotal = 0;
        let _chunkKbId = '';
        let _chunkDocId = '';
        const _chunkPageSize = 50;

        async function showChunkPreview(kbId, docId, filename) {
            _chunkKbId = kbId;
            _chunkDocId = docId;
            _chunkCurrentPage = 1;

            document.getElementById('chunk-modal-title').textContent = `📄 ${filename}`;
            document.getElementById('chunk-modal-subtitle').textContent = '加载分块数据...';
            document.getElementById('chunk-count-badge').classList.add('hidden');
            document.getElementById('chunk-pagination').classList.add('hidden');
            document.getElementById('chunk-list').innerHTML = `
                <div class="chunk-loading">
                    <div class="spinner"></div>
                    <span>加载分块数据...</span>
                </div>`;
            document.getElementById('chunk-modal').classList.remove('hidden');

            await renderChunkPage();
        }

        async function renderChunkPage() {
            const page = _chunkCurrentPage;
            const listEl = document.getElementById('chunk-list');
            const paginationEl = document.getElementById('chunk-pagination');
            const badge = document.getElementById('chunk-count-badge');

            // Show loading state
            listEl.innerHTML = `
                <div class="chunk-loading">
                    <div class="spinner"></div>
                    <span>加载分块数据...</span>
                </div>`;
            paginationEl.classList.add('hidden');

            try {
                const traceId = generateTraceId();
                const resp = await fetch(`${API_BASE}/kbs/documents/chunks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Trace-ID': traceId },
                    body: JSON.stringify({ kb_id: _chunkKbId, doc_id: _chunkDocId, page, page_size: _chunkPageSize }),
                });
                const body = await resp.json();
                const data = body.data || {};
                const items = data.items || [];
                _chunkTotal = data.total || 0;
                const totalPages = Math.ceil(_chunkTotal / _chunkPageSize) || 1;

                // Update badge (only on first load)
                badge.textContent = `${_chunkTotal} 个分块`;
                badge.classList.remove('hidden');
                document.getElementById('chunk-modal-subtitle').textContent = '';

                if (_chunkTotal === 0) {
                    listEl.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                            <div class="text-4xl mb-3">📄</div>
                            <p class="text-sm font-medium">暂无分块数据</p>
                        </div>`;
                    paginationEl.classList.add('hidden');
                    return;
                }

                // Update page info
                const start = (page - 1) * _chunkPageSize;
                document.getElementById('chunk-page-info').textContent =
                    `第 ${page} / ${totalPages} 页，共 ${_chunkTotal} 条`;

                // Enable/disable buttons
                document.getElementById('chunk-prev-btn').disabled = page <= 1;
                document.getElementById('chunk-next-btn').disabled = page >= totalPages;
                paginationEl.classList.remove('hidden');

                // Render chunk cards
                listEl.innerHTML = items.map((chunk, i) => {
                    const badgeLabel = chunk.block_type === 'table' ? '表格'
                        : chunk.block_type === 'qa_pair' ? 'QA'
                        : '文本';
                    const badgeColor = chunk.block_type === 'table' ? 'bg-orange-100 text-orange-700'
                        : chunk.block_type === 'qa_pair' ? 'bg-green-100 text-green-700'
                        : 'bg-purple-100 text-purple-700';
                    return `
                    <div class="chunk-card" style="animation-delay: ${i * 0.06}s">
                        <div class="chunk-card-header">
                            <span class="chunk-card-number">分块 ${start + i + 1}</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded-full ${badgeColor} ml-2">${badgeLabel}</span>
                            <span class="chunk-card-meta">
                                ${chunk.page ? `<span><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>第 ${chunk.page} 页</span>` : ''}
                                <span><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>${chunk.char_count || 0} 字符</span>
                                ${chunk.tokens ? `<span><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${chunk.tokens} tokens</span>` : ''}
                            </span>
                        </div>
                        <div class="chunk-card-body">
                            <pre>${escapeHtml(chunk.content)}</pre>
                        </div>
                        ${chunk.parent_content ? `
                        <details class="border-t border-slate-100">
                            <summary class="px-4 py-2 text-xs text-slate-500 cursor-pointer hover:bg-slate-50 font-medium select-none">查看父段落上下文</summary>
                            <div class="px-4 py-3 bg-slate-50 border-t border-slate-100">
                                <pre class="text-xs text-slate-600 leading-relaxed whitespace-pre-wrap font-mono">${escapeHtml(chunk.parent_content)}</pre>
                            </div>
                        </details>` : ''}
                    </div>
                `;
                }).join('');

                // Reset animations
                document.querySelectorAll('.chunk-card').forEach((el) => {
                    el.style.animation = 'none';
                    el.offsetHeight;
                    el.style.animation = '';
                });
            } catch (err) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                        <div class="text-4xl mb-3">⚠</div>
                        <p class="text-sm font-medium text-red-400 mb-3">加载分块失败: ${err.message}</p>
                        <button onclick="renderChunkPage()" class="text-xs text-blue-600 hover:text-blue-700 font-medium underline underline-offset-2">重试</button>
                    </div>`;
            }
        }

        function changeChunkPage(delta) {
            const totalPages = Math.ceil(_chunkTotal / _chunkPageSize) || 1;
            const newPage = _chunkCurrentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            _chunkCurrentPage = newPage;
            renderChunkPage();
        }

        function hideChunkPreview() {
            document.getElementById('chunk-modal').classList.add('hidden');
            _chunkCurrentPage = 1;
            _chunkTotal = 0;
            _chunkKbId = '';
            _chunkDocId = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ====== Utilities ======
        function formatSize(bytes) {
            if (!bytes) return '未知';
            if (bytes < 1024) return bytes + 'B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
            return (bytes / 1024 / 1024).toFixed(1) + 'MB';
        }

        // Close modals on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideCreateModal();
                hideDeleteModal();
                hideChunkPreview();
            }
        });

        // ====== Init ======
        document.addEventListener('DOMContentLoaded', loadKBs);
    </script>
</body>
</html>
